<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Lakmina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #020617;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .loader-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* කැරකෙන නිල් පැහැති ලයිට් එක */
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(37, 99, 235, 0.1);
            border-top: 4px solid #2563eb;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 10;
        }

        /* Loading Percentage */
        .percentage {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2563eb;
            text-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        /* Message Typing Area */
        .message-box {
            max-width: 80%;
            text-align: center;
            height: 100px;
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
        }

        .typing-text {
            border-right: 2px solid #2563eb;
            white-space: pre-wrap;
            overflow: hidden;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-out {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="loader-container" id="main-loader">
        <div class="loader-ring"></div>
        <img src="https://lh3.googleusercontent.com/d/1_Kktl5Kq2hD3VQbyMpfAUBA6vkCC2lEo" alt="Logo" class="logo-img">
    </div>

    <div class="percentage" id="count">0%</div>

    <div class="message-box">
        <span id="typing" class="typing-text"></span>
    </div>

    <script>
        const targetUrl = "HOME.html";
        const message = "🔖 Web App එක ගැන ඔබට ඇති වෙන ඕනෑම ප්‍රෂ්නෙක දී\nමා සම්බන්ද කර ගන්න\n WhatsApp: 🫟 0788637885\n Telegram: 🫟 0788637885";
        
        const countElement = document.getElementById('count');
        const typingElement = document.getElementById('typing');
        
        // 1. Loading Counter (තත්පර 10 කින් 100ට)
        let count = 0;
        const countInterval = setInterval(() => {
            count++;
            countElement.innerText = count + "%";
            if (count >= 100) clearInterval(countInterval);
        }, 100); // 100ms * 100 = 10,000ms (තත්පර 10)

        // 2. Typing Message (තත්පර 8 කින් අවසන් වීමට)
        let charIndex = 0;
        const typingSpeed = (8000 / message.length); // තත්පර 8 මුළු අකුරු ගණනින් බෙදා වේගය සකසයි

        function typeMessage() {
            if (charIndex < message.length) {
                typingElement.textContent += message.charAt(charIndex);
                charIndex++;
                setTimeout(typeMessage, typingSpeed);
            } else {
                typingElement.style.borderRight = "none"; // ලිවීම අවසන් වූ පසු Cursor එක ඉවත් කරයි
            }
        }

        // පණිවිඩය ලිවීම ආරම්භ කරන්න
        typeMessage();

        // 3. Redirect (තත්පර 10 කින් පසු)
        setTimeout(() => {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 800);
        }, 10000);
    </script>

</body>
</html>
