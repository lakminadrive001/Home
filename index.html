<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HUB | Secure Login</title>
    <style>
        /* මුළු පිටුවේම පෙනුම සකසන CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            overflow: hidden;
            position: relative;
        }

        /* පසුබිමේ ඇති පාවෙන ලස්සන ආලෝකය */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            top: 20%;
            left: 30%;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* Login Card එක */
        .login-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        .logo-area h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .logo-area p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 45px;
            font-weight: 400;
        }

        /* Google බටන් එක */
        .google-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #ffffff;
            color: #020617;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 242, 255, 0.15);
        }

        .google-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 242, 255, 0.3);
            background: #fdfdfd;
        }

        .google-btn img { width: 24px; }

        /* Loading Animation එක */
        .loader {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top-color: #00f2ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 25px auto 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-card">
        <div class="logo-area">
            <h1>AI HUB</h1>
            <p>ප්‍රමුඛ පෙළේ AI මෙවලම් සියල්ලම එකම තැනකින්</p>
        </div>
        
        <button id="googleLogin" class="google-btn">
    <div class="google-icon-wrapper">
        <img class="google-icon" src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo"/>
    </div>
    <span class="btn-text">Sign in with Google</span>
</button>

        <div id="loading" class="loader"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ඔයාගේ Firebase Project සෙටින්ග්ස්
        const firebaseConfig = {
  apiKey: "AIzaSyC3LCcUypFPgDjmMX6NQSOJjVTf_nrVfQc",
  authDomain: "chat-62f73.firebaseapp.com",
  projectId: "chat-62f73",
  storageBucket: "chat-62f73.firebasestorage.app",
  messagingSenderId: "323395960503",
  appId: "1:323395960503:web:67df3f549d8c6edda6d732",
  measurementId: "G-5HRMP823SC"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('googleLogin');
        const loader = document.getElementById('loading');

        // ලොග් වී ඇත්නම් Redirect කිරීම
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "0%100.html";
            }
        });

        // බටන් එක ක්ලික් කළ විට ලොජික් එක
        loginBtn.onclick = async () => {
            loader.style.display = "block";
            loginBtn.style.opacity = "0.7";
            loginBtn.style.pointerEvents = "none";

            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                loader.style.display = "none";
                loginBtn.style.opacity = "1";
                loginBtn.style.pointerEvents = "auto";
                console.error("Login Error:", error);
                alert("ලොග් වීමේදී ගැටලුවක් මතු විය: " + error.message);
            }
        };
    </script>
</body>
</html>
